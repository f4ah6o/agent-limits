name: Rewrite module path once

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  rewrite:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rewrite module path
        run: |
          set -eu
          old='github.com/drogers0/aistat/v2'
          new='github.com/f4ah6o/aistat/v2'
          git grep -l "$old" | xargs -r perl -0pi -e "s#\Q$old\E#$new#g"

          # Keep the upstream project visible as a reference in README, but do not
          # leave install/module-path instructions pointing at the upstream module.
          perl -0pi -e 's#The module path is still the upstream module path, so clone-and-build is the supported install path for this fork\. Avoid `go install github\.com/f4ah6o/aistat/\.\.\.@latest` until the module path is intentionally renamed across the repository\.#The module path is `github.com/f4ah6o/aistat/v2`. Clone-and-build and `go install github.com/f4ah6o/aistat/v2/cmd/aistat@latest` are both expected to use this fork.#' README.md

          git rm .github/workflows/rewrite-module-path-once.yml

          if git diff --quiet --cached && git diff --quiet; then
            echo 'no changes'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Rewrite module path to fork'
          git push
